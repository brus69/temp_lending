{% extends "shop/base.html" %}

{% block title %}LendingStore - Смена пароля{% endblock %}

{% block content %}
<main class="vi-container mx-auto w-full space-y-6 px-4 py-8">
  <nav class="text-sm text-slate-500">
    <a href="{% url 'account' %}" class="hover:text-slate-700">Мой кабинет</a>
    <span class="mx-1">/</span>
    <a href="{% url 'account_personal_data' %}" class="hover:text-slate-700">Личные данные</a>
    <span class="mx-1">/</span>
    <span class="text-slate-700">Смена пароля</span>
  </nav>

  <h1 class="text-3xl font-bold text-slate-800">Смена пароля</h1>

  <section class="max-w-xl rounded-2xl bg-white p-6">
    {% if password_error %}
    <div class="mb-4 rounded-lg bg-red-100 px-3 py-2 text-sm text-red-700">{{ password_error }}</div>
    {% endif %}
    <form method="post" class="space-y-3">
      {% csrf_token %}
      <label class="block text-sm font-medium text-slate-700">
        Текущий пароль
        <input
          type="password"
          name="old_password"
          required
          autocomplete="current-password"
          class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-slate-500 focus:outline-none"
        >
      </label>
      <label class="block text-sm font-medium text-slate-700">
        Новый пароль
        <input
          type="password"
          name="new_password1"
          required
          autocomplete="new-password"
          minlength="6"
          class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-slate-500 focus:outline-none"
        >
      </label>
      <label class="block text-sm font-medium text-slate-700">
        Повторите новый пароль
        <input
          type="password"
          name="new_password2"
          required
          autocomplete="new-password"
          minlength="6"
          class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-slate-500 focus:outline-none"
        >
      </label>
      <div class="flex flex-wrap gap-2 pt-2">
        <a href="{% url 'account_personal_data' %}" class="rounded-xl bg-slate-200 px-4 py-2.5 text-sm font-semibold text-slate-700 hover:bg-slate-300">Отмена</a>
        <button type="submit" class="rounded-xl bg-slate-800 px-4 py-2.5 text-sm font-semibold text-white hover:bg-slate-900">Изменить пароль</button>
      </div>
    </form>
  </section>
</main>
{% endblock %}
