{% extends "shop/base.html" %}

{% block title %}Каталог товаров {{ store_name }}{% endblock %}

{% block content %}
<main class="vi-container mx-auto w-full space-y-5 px-4 py-8">
  <nav class="text-xs text-slate-500">
    <a href="{% url 'index' %}" class="hover:text-slate-700">Главная</a>
    <span class="mx-1">/</span>
    <span class="text-slate-700">{{ store_name }}</span>
  </nav>
  <section>
    <h1 class="text-4xl font-bold tracking-tight text-slate-800">Каталог товаров {{ store_name }}</h1>
    <div class="mt-6 grid gap-3 md:grid-cols-4 lg:grid-cols-6">
      {% for category in categories %}
      <a href="{% url 'sub_category_by_slug' category.slug %}" class="rounded-2xl bg-[#eceef1] p-3 hover:bg-[#e6e8ec]">
        <p class="text-[20px] font-semibold leading-tight text-slate-800">{{ category.name }}</p>
        <p class="mt-1 text-sm text-slate-500">{{ category.product_count }} товаров</p>
        <img src="{{ category.primary_image_url }}" alt="{{ category.name }}" class="mt-3 h-28 w-full object-contain">
      </a>
      {% endfor %}
    </div>
  </section>
</main>
{% endblock %}
