{% extends "shop/base.html" %}

{% block title %}Подтверждение email{% endblock %}

{% block content %}
<main class="vi-container mx-auto w-full px-4 py-10">
  <section class="mx-auto max-w-2xl rounded-2xl bg-white p-6 shadow-sm">
    <h1 class="text-3xl font-bold text-slate-900">{{ title }}</h1>
    <p class="mt-3 text-slate-700">{{ message }}</p>
    <div class="mt-5">
      <a href="{% url 'index' %}" class="inline-flex rounded-xl bg-red-600 px-4 py-2 text-sm font-semibold text-white hover:bg-red-700">
        На главную
      </a>
    </div>
  </section>
</main>
{% endblock %}
