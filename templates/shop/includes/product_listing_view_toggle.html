<div class="vi-listing-view-toggle" data-listing-view-toggle role="group" aria-label="Вид каталога">
  <button
    type="button"
    class="vi-listing-view-toggle__btn is-active"
    data-listing-view="grid"
    aria-pressed="true"
    aria-label="Плитка"
    title="Плитка"
  >
    <svg class="vi-listing-view-toggle__icon" width="22" height="22" viewBox="0 0 22 22" aria-hidden="true">
      <rect x="2" y="2" width="8" height="8" rx="2"></rect>
      <rect x="12" y="2" width="8" height="8" rx="2"></rect>
      <rect x="2" y="12" width="8" height="8" rx="2"></rect>
      <rect x="12" y="12" width="8" height="8" rx="2"></rect>
    </svg>
  </button>
  <button
    type="button"
    class="vi-listing-view-toggle__btn"
    data-listing-view="list"
    aria-pressed="false"
    aria-label="Список"
    title="Список"
  >
    <svg class="vi-listing-view-toggle__icon" width="22" height="22" viewBox="0 0 22 22" aria-hidden="true">
      <rect x="2" y="4" width="18" height="6" rx="2"></rect>
      <rect x="2" y="12" width="18" height="6" rx="2"></rect>
    </svg>
  </button>
</div>
