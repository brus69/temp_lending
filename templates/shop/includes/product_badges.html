{% if product.labels.all %}
<div class="flex flex-wrap gap-1">
  {% for label in product.labels.all %}
  <span class="inline-block rounded-md {{ label.background_class }} px-2 py-1 text-xs font-semibold {% if label.text_class %}{{ label.text_class }}{% else %}text-white{% endif %}">{{ label.name }}</span>
  {% endfor %}
</div>
{% endif %}
