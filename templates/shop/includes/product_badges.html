{% if product.is_best_price or product.is_closed_sale or product.is_new %}
<div class="flex flex-wrap gap-1">
  {% if product.is_best_price %}
  <span class="inline-block rounded-md bg-sky-500 px-2 py-1 text-xs font-semibold text-white">Лучшая цена</span>
  {% endif %}
  {% if product.is_closed_sale %}
  <span class="inline-block rounded-md bg-violet-600 px-2 py-1 text-xs font-semibold text-white">Закрытая распродажа</span>
  {% endif %}
  {% if product.is_new %}
  <span class="inline-block rounded-md bg-emerald-600 px-2 py-1 text-xs font-semibold text-white">Новинка</span>
  {% endif %}
</div>
{% endif %}
