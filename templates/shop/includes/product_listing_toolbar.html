<div class="flex flex-wrap items-center gap-3">
  <select
    name="sort"
    data-product-sort
    {% if filter_form_id %}form="{{ filter_form_id }}"{% endif %}
    class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-800"
    aria-label="Сортировка товаров"
  >
    <option value="popular"{% if current_sort == "popular" or not current_sort %} selected{% endif %}>По популярности</option>
    <option value="price_asc"{% if current_sort == "price_asc" %} selected{% endif %}>Сначала дешевле</option>
    <option value="price_desc"{% if current_sort == "price_desc" %} selected{% endif %}>Сначала дороже</option>
  </select>
  {% include "shop/includes/product_listing_view_toggle.html" %}
</div>
