{% if product_expert_manager and category_managers %}
<div
  data-expert-request-modal
  hidden
  class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-900/60 p-4"
  aria-hidden="true"
>
  <div
    data-expert-request-dialog
    class="vi-expert-request-modal w-full max-w-[42rem] rounded-2xl bg-white p-6 shadow-2xl md:p-8"
    role="dialog"
    aria-modal="true"
    aria-labelledby="expert-request-title"
  >
    <div class="flex items-start justify-between gap-4">
      <h2 id="expert-request-title" class="text-xl font-bold text-slate-800 md:text-2xl">
        Заявка на покупку товара
      </h2>
      <button
        type="button"
        data-expert-request-close
        class="shrink-0 rounded-md px-2 py-1 text-2xl leading-none text-slate-400 hover:bg-slate-100 hover:text-slate-700"
        aria-label="Закрыть"
      >
        ×
      </button>
    </div>

    <div class="mt-6 grid gap-6 md:grid-cols-[1fr_11rem] md:items-start">
      <form
        method="post"
        action="{% url 'expert_product_request' product.id %}"
        class="space-y-4"
        data-expert-request-form
      >
        {% csrf_token %}
        <input type="hidden" name="quantity" value="1" data-expert-request-qty>

        {% if category_managers|length > 1 %}
        <label class="block text-sm text-slate-600">
          Менеджер
          <select
            name="manager_id"
            class="vi-expert-request-field mt-1 w-full appearance-none bg-white"
            data-expert-request-manager-select
          >
            {% for manager in category_managers %}
            <option
              value="{{ manager.id }}"
              data-photo-url="{{ manager.primary_photo_url }}"
              {% if manager.id == product_expert_manager.id %}selected{% endif %}
            >{{ manager.name }}</option>
            {% endfor %}
          </select>
        </label>
        {% else %}
        <input type="hidden" name="manager_id" value="{{ product_expert_manager.id }}">
        {% endif %}

        <label class="block text-sm text-slate-600">
          Ваше имя<span class="text-red-600">*</span>
          <input
            type="text"
            name="customer_name"
            required
            autocomplete="name"
            placeholder="Иван Иванович"
            class="vi-expert-request-field mt-1 w-full"
          >
        </label>

        <label class="block text-sm text-slate-600">
          Телефон<span class="text-red-600">*</span>
          <input
            type="tel"
            name="phone"
            required
            autocomplete="tel"
            placeholder="+7 (___) ___-__-__"
            class="vi-expert-request-field mt-1 w-full"
          >
        </label>

        <label class="block text-sm text-slate-600">
          Ваш вопрос
          <textarea
            name="question"
            rows="3"
            placeholder="Я хочу спросить..."
            class="vi-expert-request-field vi-expert-request-field--textarea mt-1 w-full resize-y"
          ></textarea>
        </label>

        <label class="flex cursor-pointer items-start gap-2 text-sm text-slate-600">
          <input
            type="checkbox"
            name="personal_data_consent"
            value="1"
            checked
            required
            class="vi-expert-request-checkbox mt-0.5"
          >
          <span>
            Я согласен на
            <a href="#" class="text-sky-600 hover:underline">обработку персональных данных</a>
          </span>
        </label>

        <button
          type="submit"
          class="w-full rounded-lg bg-red-600 px-4 py-3 text-sm font-semibold text-white hover:bg-red-700 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-red-500"
        >
          Оформить заказ
        </button>
      </form>

      <div class="vi-expert-request-modal__photo-wrap mx-auto md:mx-0">
        <img
          src="{{ product_expert_manager.primary_photo_url }}"
          alt="{{ product_expert_manager.name }}"
          class="vi-expert-request-modal__photo"
          width="176"
          height="176"
          loading="lazy"
          data-expert-request-photo
        >
      </div>
    </div>
  </div>
</div>
{% endif %}
