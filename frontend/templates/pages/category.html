<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LendingStore - Категория</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../../static/css/custom.css">
</head>
<body class="bg-[#f6f7f8] text-slate-900">
  <header class="border-b border-slate-200 bg-white">
    <div class="mx-auto flex w-full max-w-[1240px] items-center justify-between px-4 py-3">
      <a href="index.html" class="rounded-xl bg-red-600 px-4 py-2 text-lg font-bold leading-none text-white">Все инструменты</a>
      <div class="flex-1 px-4 text-sm text-slate-500">Главная / Крепеж</div>
      <a href="sub-category.html" class="text-sm font-medium text-slate-700">Перейти к листингу</a>
    </div>
  </header>

  <main class="mx-auto w-full max-w-[1240px] space-y-6 px-4 py-8">
    <section>
      <h1 class="text-5xl font-bold">Крепеж</h1>
      <h2 class="mt-3 text-4xl font-semibold">Подбор крепежа по DIN, ГОСТ и ISO</h2>
      <div class="mt-6 grid gap-4 md:grid-cols-4 lg:grid-cols-6">
        <a href="sub-category.html" class="rounded-2xl bg-[#eceef1] p-4">
          <p class="text-2xl font-semibold">Метизы</p>
          <p class="text-sm text-slate-500">438 150 товаров</p>
          <img src="https://images.unsplash.com/photo-1586864387967-d02ef85d93e8?auto=format&fit=crop&w=260&q=80" alt="Метизы" class="mt-3 h-24 w-full object-contain">
        </a>
        <a href="sub-category.html" class="rounded-2xl bg-[#eceef1] p-4">
          <p class="text-2xl font-semibold">Скобяные изделия</p>
          <p class="text-sm text-slate-500">104 522 товара</p>
          <img src="https://images.unsplash.com/photo-1572981779307-38b8cabb2407?auto=format&fit=crop&w=260&q=80" alt="Скобяные изделия" class="mt-3 h-24 w-full object-contain">
        </a>
        <a href="sub-category.html" class="rounded-2xl bg-[#eceef1] p-4">
          <p class="text-2xl font-semibold">Специальный крепеж</p>
          <p class="text-sm text-slate-500">96 788 товаров</p>
          <img src="https://images.unsplash.com/photo-1599948128020-9a44505b3a80?auto=format&fit=crop&w=260&q=80" alt="Специальный крепеж" class="mt-3 h-24 w-full object-contain">
        </a>
        <a href="sub-category.html" class="rounded-2xl bg-[#eceef1] p-4">
          <p class="text-2xl font-semibold">Такелаж</p>
          <p class="text-sm text-slate-500">64 732 товара</p>
          <img src="https://images.unsplash.com/photo-1581092580497-e0d23cbdf1dc?auto=format&fit=crop&w=260&q=80" alt="Такелаж" class="mt-3 h-24 w-full object-contain">
        </a>
        <a href="sub-category.html" class="rounded-2xl bg-[#eceef1] p-4">
          <p class="text-2xl font-semibold">Пластиковый крепеж</p>
          <p class="text-sm text-slate-500">28 878 товаров</p>
          <img src="https://images.unsplash.com/photo-1585704032915-c3400ca199e7?auto=format&fit=crop&w=260&q=80" alt="Пластиковый крепеж" class="mt-3 h-24 w-full object-contain">
        </a>
        <a href="sub-category.html" class="rounded-2xl bg-[#eceef1] p-4">
          <p class="text-2xl font-semibold">Автокрепеж</p>
          <p class="text-sm text-slate-500">5 246 товаров</p>
          <img src="https://images.unsplash.com/photo-1611835151646-5a9df7f11463?auto=format&fit=crop&w=260&q=80" alt="Автокрепеж" class="mt-3 h-24 w-full object-contain">
        </a>
      </div>
    </section>
  </main>
  <script src="../../static/js/main.js"></script>

</html>
