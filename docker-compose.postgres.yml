# Использование: docker compose -f docker-compose.yml -f docker-compose.postgres.yml up --build

services:
  web:
    environment:
      DJANGO_USE_POSTGRES: "1"
      POSTGRES_DB: ${POSTGRES_DB:-lending}
      POSTGRES_USER: ${POSTGRES_USER:-lending}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lending}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lending}
      POSTGRES_USER: ${POSTGRES_USER:-lending}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lending}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 3s
      timeout: 5s
      retries: 15

volumes:
  postgres_data:
